<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MyBaseCamp — Project Management Tool</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>

  <div class="bg-circle bg-circle-1"></div>
  <div class="bg-circle bg-circle-2"></div>
  <div class="bg-circle bg-circle-3"></div>

  <main class="container">

    <div class="logo-icon" id="logoIcon">
      <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
        <!-- Head -->
        <circle cx="50" cy="28" r="14" stroke="#1D9E75" stroke-width="4"/>
        
        <path d="M20 75 Q20 52 50 52 Q80 52 80 75"
              stroke="#1D9E75" stroke-width="4" stroke-linecap="round"/>
        
        <path d="M20 75 Q10 65 14 55"
              stroke="#1D9E75" stroke-width="4" stroke-linecap="round"/>
        
        <path d="M80 75 Q90 65 86 55"
              stroke="#1D9E75" stroke-width="4" stroke-linecap="round"/>
        
        <path d="M42 30 Q50 38 58 30"
              stroke="#1D9E75" stroke-width="3" stroke-linecap="round" fill="none"/>
      </svg>
    </div>

    <h1 class="brand-name" id="brandName">MyBaseCamp</h1>

    <p class="tagline" id="tagline">Project management tool for developers</p>

    <div class="btn-group" id="btnGroup">
      <a href="pages/register.html" class="btn btn-primary" id="btnSignup">
        Sign Up
      </a>

      <a href="pages/login.html" class="btn btn-outline" id="btnLogin">
        Login
      </a>
    </div>

    <p class="footer-text" id="footerText">
      Start for free 
    </p>

  </main>

  <script src="../js/index.js"></script>

</html>
