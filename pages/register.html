<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Sign up — MyBaseCamp</title>

   <link rel="stylesheet" href="../css/register.css">
</head>

<body>

  <nav>
    <a href="index.html" class="logo">MyBaseCamp</a>
    <a href="login.html" class="nav-link">Already have an account? Log in →</a>
  </nav>

  <div class="page-center">
    <div class="card">

      <h1 class="card-title">Create an account</h1>
      <p class="card-subtitle">Welcome to MyBaseCamp</p>

      <form action="/register" method="POST" id="registerForm">

        <div class="form-group">
          <label for="fullname">fullname</label>

          <input
            type="text"
            id="fullname"
            name="fullname"
            placeholder="Mahammad Mirzayev"
            required 
          >
          <span class="error-text" id="fullname-error"> Full name is required</span>
        </div>

        <div class="form-group">
          <label for="email">Email</label>
          <input
            type="email"
            id="email"
            name="email"
            placeholder="mahammad@example.com"
            required
          >
          <span class="error-text" id="email-error">  Full name is required</span>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input
            type="password"
            id="password"
            name="password"
            placeholder="At least 6 characters"
            required
            minlength="6"
          >
          <span class="error-text" id="password-error">Must be at least 6 characters long</span>
        </div>

        <div class="form-group">
          <label for="password_confirm">Password confirmation</label>
          <input
            type="password"
            id="password_confirm"
            name="password_confirm"
            placeholder="Password confirmation"
            required
          >
          <div class="strength-wrapper">
              <div class="strength-line">
                 <div id="strengthBar"></div>
                   </div>

               <span id="strengthText"></span>
                   </div>
          <span class="error-text" id="confirm-error"> Passwords do not match</span>
        </div>

       <button type="submit" class="btn-submit" id="submitBtn">
            Sign Up
        </button>   

      </form>

      <div class="divider">or</div>

      <div class="form-footer">
      Already a member? 
        <a href="login.html">Log in</a>
      </div>

    </div>
  </div>

  <script src="../js/register.js"></script>
</body>
</html>
