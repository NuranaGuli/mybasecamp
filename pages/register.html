<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Sign up — MyBaseCamp</title>

  <style>
 
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background-color: #f4f5f7;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    nav {
      background-color: #ffffff;
      height: 56px;
      padding: 0 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid #e0e4ea;
    }

    .logo {
      font-size: 18px;
      font-weight: 700;
      color: #90080836;
      text-decoration: none;
    }

    .nav-link {
      font-size: 14px;
      color: #42526e;
      text-decoration: none;
    }

    .nav-link:hover {
      color: #a12a1a;
    }

    .page-center {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
    }

    .card {
      background-color: #ffffff;
      border-radius: 12px;
      border: 1px solid #e0e4ea;
      padding: 40px;
      width: 100%;
      max-width: 440px;
    }

    .card-title {
      font-size: 24px;
      font-weight: 700;
      color: #172b4d;
      margin-bottom: 6px;
    }

    .card-subtitle {
      font-size: 14px;
      color: #6b778c;
      margin-bottom: 28px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: #42526e;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
    }

    input[type="text"],
    input[type="email"],
    input[type="password"] {
      width: 100%;
      padding: 11px 14px;
      border: 1.5px solid #dfe1e6;
      border-radius: 6px;
      font-size: 14px;
      color: #172b4d;
      background-color: #fafbfc;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    input:focus {
      border-color: #a23317;
      background-color: #ffffff;
      box-shadow: 0 0 0 3px rgba(29, 158, 117, 0.15);
    }

    input.error {
      border-color: #E24B4A;
    }

    .error-text {
      font-size: 12px;
      color: #A32D2D;
      margin-top: 5px;
      display: none;
    }

    .error-text.visible {
      display: block;
    }

    .btn-submit {
      width: 100%;
      padding: 12px;
      background-color: #bb4242;
      color: #ffffff;
      border: none;
      border-radius: 6px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background-color 0.2s;
      margin-top: 8px;
    }

    .btn-submit:hover {
      background-color: #5f1212;
    }

    .btn-submit:active {
      transform: scale(0.99);
    }

    .form-footer {
      text-align: center;
      margin-top: 20px;
      font-size: 14px;
      color: #6b778c;
    }

    .form-footer a {
      color: #8a1b1b;
      text-decoration: none;
      font-weight: 500;
    }

    .form-footer a:hover {
      text-decoration: underline;
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 20px 0;
      color: #6b778c;
      font-size: 12px;
    }

    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background-color: #e0e4ea;
    }

    @media (max-width: 480px) {
      .card {
        padding: 28px 20px;
        border-radius: 8px;
      }
    }
  </style>
</head>

<body>

  <nav>
    <a href="index.html" class="logo">MyBaseCamp</a>
    <a href="login.html" class="nav-link">Already have an account? Log in →</a>
  </nav>

  <div class="page-center">
    <div class="card">

      <h1 class="card-title">Create an account</h1>
      <p class="card-subtitle">Welcome to MyBaseCamp</p>

      <form action="/register" method="POST" id="registerForm">

        <div class="form-group">
          <label for="fullname">fullname</label>

          <input
            type="text"
            id="fullname"
            name="fullname"
            placeholder="Mahammad Mirzayev"
            required 
          >
          <span class="error-text" id="fullname-error"> Full name is required</span>
        </div>

        <div class="form-group">
          <label for="email">Email</label>
          <input
            type="email"
            id="email"
            name="email"
            placeholder="mahammad@example.com"
            required
          >
          <span class="error-text" id="email-error">  Full name is required</span>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input
            type="password"
            id="password"
            name="password"
            placeholder="At least 6 characters"
            required
            minlength="6"
          >
          <span class="error-text" id="password-error">Must be at least 6 characters long</span>
        </div>

        <div class="form-group">
          <label for="password_confirm">Password confirmation</label>
          <input
            type="password"
            id="password_confirm"
            name="password_confirm"
            placeholder="Password confirmation"
            required
          >
          <span class="error-text" id="confirm-error"> Passwords do not match</span>
        </div>

        <button type="submit" class="btn-submit">Sign Up</button>

      </form>

      <div class="divider">or</div>

      <div class="form-footer">
      Already a member? 
        <a href="login.html">Log in</a>
      </div>

    </div>
  </div>

  <script>
    document.getElementById('registerForm').addEventListener('submit', function(e) {
      let valid = true;
     
      const fullname = document.getElementById('fullname');
      if (fullname.value.trim() === '') {
        fullname.classList.add('error');
        document.getElementById('fullname-error').classList.add('visible');
        valid = false;
      } else {
        fullname.classList.remove('error');
        document.getElementById('fullname-error').classList.remove('visible');
      }

      const pass = document.getElementById('password').value;
      const confirm = document.getElementById('password_confirm');
      if (pass !== confirm.value) {
        confirm.classList.add('error');
        document.getElementById('confirm-error').classList.add('visible');
        valid = false;
      } else {
        confirm.classList.remove('error');
        document.getElementById('confirm-error').classList.remove('visible');
      }

      if (!valid) {
        e.preventDefault();
      }
    });
  </script>

  <script src="assets/js/register.js"></script>
</body>
</html>
